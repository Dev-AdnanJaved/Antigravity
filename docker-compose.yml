version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: pump_hunter_db
    environment:
      POSTGRES_DB: pump_hunter
      POSTGRES_USER: pump_hunter
      POSTGRES_PASSWORD: pump_hunter_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pump_hunter"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pump_hunter_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
